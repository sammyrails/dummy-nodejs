name: Vercel Deploy

on:
    pull_request:
        branches: [dev]
        types: [opened, synchronize, reopened, ready_for_review]
    push:
        branches: [main, dev]

concurrency:
    group: vercel-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            pull-requests: write

        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_TELEMETRY_DISABLED: 1

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: package-lock.json

            - name: Install Vercel CLI
              run: npm install --global vercel@latest

            - name: Install dependencies
              run: npm ci

            # ── Preview (PR → dev) ────────────────────────────────────────────
            - name: Pull preview env
              if: github.event_name == 'pull_request'
              run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

            - name: Build preview
              if: github.event_name == 'pull_request'
              run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

            - name: Deploy preview
              if: github.event_name == 'pull_request'
              id: deploy-preview
              run: |
                  url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
                  echo "url=$url" >> $GITHUB_OUTPUT

            - name: Comment preview URL on PR
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              env:
                  PREVIEW_URL: ${{ steps.deploy-preview.outputs.url }}
              with:
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: `✅ Preview deployed: ${process.env.PREVIEW_URL}`
                      })

            # ── Test (push → dev) ─────────────────────────────────────────────
            - name: Pull dev env
              if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
              run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

            - name: Build dev
              if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
              run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

            - name: Deploy TEST (push → dev)
              if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
              run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

            # ── Production (push → main) ──────────────────────────────────────
            - name: Pull production env
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

            - name: Build production
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

            - name: Deploy PRODUCTION (push → main)
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
